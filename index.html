<div class="app">

function materialSummaryValues(stage){const items=materialsFor(stage),states=items.map((_,index)=>materialStates[materialKey(stage.materialPhase,index)]||0);return{total:items.length,prepared:states.filter(value=>value>=1).length,submitted:states.filter(value=>value>=2).length,confirmed:states.filter(value=>value===3).length}}
function updateMaterialSummary(stage){const summary=materialSummaryValues(stage);document.querySelectorAll('[data-material-summary]').forEach(node=>{const key=node.dataset.materialSummary;node.textContent=`${key==='prepared'?'已准备':key==='submitted'?'已提交':'已确认'} ${summary[key]}/${summary.total}`})}
function renderMaterials(stage){const phase=stage.materialPhase,items=materialsFor(stage),summary=materialSummaryValues(stage);let html=`<h4>我的材料</h4><div class="material-summary"><span data-material-summary="prepared">已准备 ${summary.prepared}/${summary.total}</span><span data-material-summary="submitted">已提交 ${summary.submitted}/${summary.total}</span><span data-material-summary="confirmed">已确认 ${summary.confirmed}/${summary.total}</span></div>`;if(phase==='compensation'&&selectedScenario.hasInsurance)html+='<div class="material-link-note">“资料送达凭证”标记为“保险公司已确认收到”时，只会同步“保险公司已收到资料”这一事实；法定起算日仍以凭证上的实际收件日期为准。</div>';html+=items.map((item,index)=>{const key=materialKey(phase,index),value=materialStates[key]||0,labels=['未准备','我已准备','我已提交',confirmationLabel(phase)];return `<div class="material-item"><h5>${item}</h5><select class="material-select" data-material-key="${key}" aria-label="${item}状态">${labels.map((label,state)=>`<option value="${state}" ${value===state?'selected':''}>${label}</option>`).join('')}</select></div>`}).join('');return html}
function renderOfficial(stage){const links=[['道路事故处理程序规定',SOURCE_ROAD]];if(stage.deadlineType==='insurance')links.push(['交强险条例',SOURCE_INS]);if(['recognition','review'].includes(stage.deadlineType))links.push(['2026年节假日安排',SOURCE_HOLIDAY]);return `<h4>${stage.official.name}</h4><p>${stage.official.text}</p><div class="source-links">${links.map(link=>`<a class="official-btn" href="${link[1]}" target="_blank" rel="noopener">${link[0]}</a>`).join('')}</div>`}
function renderDrawer(reveal=false){document.querySelectorAll('.fold').forEach(button=>{const active=button.dataset.fold===openFold;button.classList.toggle('active',active);button.setAttribute('aria-expanded',active?'true':'false')});const drawer=document.getElementById('drawer');if(!openFold){drawer.classList.remove('show');drawer.innerHTML='';return}const stage=stages[currentIndex];let html='';if(openFold==='why')html=`<h4>为什么这样</h4><p>${stage.why}</p>`;if(openFold==='how')html=`<h4>具体怎么做</h4><ol>${stage.how.map(item=>`<li>${item}</li>`).join('')}</ol>`;if(openFold==='materials')html=renderMaterials(stage);if(openFold==='wait')html=renderWait(stage);if(openFold==='official')html=renderOfficial(stage);drawer.innerHTML=html;drawer.classList.add('show');drawer.querySelectorAll('[data-deadline-field]').forEach(button=>button.onclick=()=>{const group=button.dataset.deadlineGroup,field=button.dataset.deadlineField,value=button.dataset.value;deadlineState[group][field]=value;if(group==='insurance'&&field==='materialsReceived'){const key=insuranceReceiptKey();materialStates[key]=value==='yes'?3:Math.min(materialStates[key]||0,2)}saveState();renderDrawer(false)});drawer.querySelectorAll('[data-deadline-date-field]').forEach(input=>input.onchange=()=>{deadlineState[input.dataset.deadlineDateGroup][input.dataset.deadlineDateField]=input.value;saveState();renderDrawer(false)});drawer.querySelectorAll('[data-material-key]').forEach(select=>select.onchange=()=>{const key=select.dataset.materialKey;materialStates[key]=Number(select.value);if(key===insuranceReceiptKey())deadlineState.insurance.materialsReceived=materialStates[key]===3?'yes':'no';saveState();updateMaterialSummary(stage)});if(reveal)requestAnimationFrame(()=>{drawer.scrollIntoView({behavior:matchMedia('(prefers-reduced-motion: reduce)').matches?'auto':'smooth',block:'start'});drawer.focus({preventScroll:true})})}
restoreState();
renderScenarios();renderRoles();
moreBtn.onclick=()=>{moreOpen=!moreOpen;renderScenarios();saveState()};
document.getElementById('enterBtn').onclick=()=>{if(!selectedScenario||!selectedRole)return;openFold='';activeWaitFlow='';chooseView.classList.remove('active');flowView.classList.add('active');saveState();renderFlow();window.scrollTo({top:0,behavior:'auto'})};
document.getElementById('backBtn').onclick=()=>{document.body.classList.remove('flowing');flowView.classList.remove('active');chooseView.classList.add('active');openFold='';saveState();renderScenarios();renderRoles();window.scrollTo({top:0,behavior:'auto'})};
document.querySelectorAll('.fold').forEach(b=>b.onclick=()=>{openFold=openFold===b.dataset.fold?'':b.dataset.fold;activeWaitFlow='';saveState();renderDrawer(true)});
document.getElementById('clearDataBtn').onclick=()=>{
  if(!confirm('清除这台设备上保存的事故处理进度和材料状态？'))return;
  localStorage.removeItem(STORAGE_KEY);
  selectedScenario=null;selectedRole=null;currentIndex=0;openFold='';activeWaitFlow='';materialStates={};moreOpen=false;deadlineState=defaultDeadlineState();
  document.body.classList.remove('flowing');flowView.classList.remove('active');chooseView.classList.add('active');
  renderScenarios();renderRoles();window.scrollTo({top:0,behavior:'auto'});
};
const q=new URLSearchParams(location.search);if(q.get('demo')){const sc=scenarios.find(x=>x.id===q.get('demo'))||scenarios[0];selectedScenario=sc;selectedRole=sc.roles.find(x=>x.id===q.get('role'))||sc.roles[0];if(sc.priority==='secondary')moreOpen=true;currentIndex=Math.max(0,Math.min(stages.length-1,Number(q.get('stage')||3)));renderScenarios();renderRoles();chooseView.classList.remove('active');flowView.classList.add('active');openFold=q.get('fold')||'';renderFlow()}
</script>
</body>
</html>
